<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>仙路湾官网访问检测</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f5f7;
        --ink: #1d1d1f;
        --muted: #6e6e73;
        --line: rgba(0, 0, 0, 0.1);
        --card: rgba(255, 255, 255, 0.72);
        --blue: #0071e3;
        --green: #34c759;
        --orange: #ff9500;
        --red: #ff3b30;
        --shadow: 0 24px 70px rgba(0, 0, 0, 0.1);
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI",
          "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 20% 0%, rgba(0, 113, 227, 0.16), transparent 32rem),
          radial-gradient(circle at 90% 12%, rgba(52, 199, 89, 0.12), transparent 28rem),
          linear-gradient(180deg, #fff 0%, var(--bg) 54%, #ececf0 100%);
      }

      .page {
        width: min(1120px, calc(100% - 32px));
        min-height: 100vh;
        margin: 0 auto;
        display: grid;
        align-items: center;
        padding: 48px 0;
      }

      .shell {
        display: grid;
        grid-template-columns: 0.95fr 1.05fr;
        gap: 28px;
        align-items: stretch;
      }

      .hero,
      .panel {
        border: 1px solid rgba(255, 255, 255, 0.74);
        background: var(--card);
        box-shadow: var(--shadow);
        backdrop-filter: blur(28px) saturate(180%);
        -webkit-backdrop-filter: blur(28px) saturate(180%);
      }

      .hero {
        min-height: 560px;
        border-radius: 30px;
        padding: 42px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        overflow: hidden;
        position: relative;
      }

      .hero::after {
        content: "";
        position: absolute;
        inset: auto -20% -28% 8%;
        height: 280px;
        border-radius: 999px;
        background: linear-gradient(90deg, rgba(0, 113, 227, 0.16), rgba(52, 199, 89, 0.18));
        filter: blur(32px);
      }

      .brand {
        position: relative;
        z-index: 1;
      }

      .eyebrow {
        margin: 0 0 14px;
        color: var(--blue);
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(46px, 7vw, 84px);
        line-height: 0.98;
        letter-spacing: 0;
      }

      .subtitle {
        max-width: 460px;
        margin: 22px 0 0;
        color: var(--muted);
        font-size: 19px;
        line-height: 1.7;
      }

      .hero-footer {
        position: relative;
        z-index: 1;
        display: grid;
        gap: 14px;
      }

      .current {
        display: inline-flex;
        width: fit-content;
        align-items: center;
        gap: 10px;
        border-radius: 999px;
        padding: 10px 14px;
        background: rgba(255, 255, 255, 0.62);
        border: 1px solid var(--line);
        color: var(--muted);
        font-size: 14px;
      }

      .dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: var(--orange);
        box-shadow: 0 0 0 5px rgba(255, 149, 0, 0.14);
      }

      .dot.ok {
        background: var(--green);
        box-shadow: 0 0 0 5px rgba(52, 199, 89, 0.14);
      }

      .dot.bad {
        background: var(--red);
        box-shadow: 0 0 0 5px rgba(255, 59, 48, 0.14);
      }

      .panel {
        border-radius: 24px;
        padding: 18px;
      }

      .toolbar {
        display: flex;
        justify-content: space-between;
        gap: 14px;
        align-items: center;
        padding: 12px 12px 18px;
      }

      .toolbar h2 {
        margin: 0;
        font-size: 22px;
      }

      .toolbar p {
        margin: 5px 0 0;
        color: var(--muted);
        font-size: 14px;
      }

      .switch {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        color: var(--muted);
        font-size: 14px;
        white-space: nowrap;
      }

      .switch input {
        width: 42px;
        height: 24px;
        appearance: none;
        border-radius: 999px;
        background: #d2d2d7;
        position: relative;
        outline: none;
        cursor: pointer;
        transition: 0.2s ease;
      }

      .switch input::before {
        content: "";
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: #fff;
        position: absolute;
        top: 2px;
        left: 2px;
        box-shadow: 0 2px 7px rgba(0, 0, 0, 0.22);
        transition: 0.2s ease;
      }

      .switch input:checked {
        background: var(--green);
      }

      .switch input:checked::before {
        transform: translateX(18px);
      }

      .list {
        display: grid;
        gap: 12px;
      }

      .url-card {
        border-radius: 18px;
        padding: 18px;
        background: rgba(255, 255, 255, 0.76);
        border: 1px solid var(--line);
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 18px;
        align-items: center;
      }

      .url-card.best {
        border-color: rgba(0, 113, 227, 0.32);
        box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.08);
      }

      .url-name {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 8px;
        font-weight: 700;
      }

      .status-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--orange);
        flex: 0 0 auto;
      }

      .url-card[data-state="ok"] .status-dot {
        background: var(--green);
      }

      .url-card[data-state="bad"] .status-dot {
        background: var(--red);
      }

      .url-link {
        word-break: break-all;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.45;
      }

      .url-meta {
        margin-top: 12px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .pill {
        border-radius: 999px;
        padding: 5px 9px;
        background: #f5f5f7;
        color: var(--muted);
        font-size: 12px;
      }

      .pill.latency {
        background: rgba(52, 199, 89, 0.12);
        color: #1f8f3a;
      }

      .actions {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      button,
      .button {
        border: 0;
        border-radius: 999px;
        padding: 11px 16px;
        color: #fff;
        background: var(--blue);
        font: inherit;
        font-size: 14px;
        font-weight: 700;
        text-decoration: none;
        cursor: pointer;
        transition:
          transform 0.18s ease,
          box-shadow 0.18s ease,
          opacity 0.18s ease;
      }

      button:hover,
      .button:hover {
        transform: translateY(-1px);
        box-shadow: 0 10px 20px rgba(0, 113, 227, 0.22);
      }

      button.secondary {
        color: var(--ink);
        background: rgba(0, 0, 0, 0.06);
      }

      button.secondary:hover {
        box-shadow: none;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.48;
        transform: none;
        box-shadow: none;
      }

      .notice {
        margin-top: 16px;
        padding: 14px;
        border-radius: 16px;
        color: var(--muted);
        background: rgba(255, 255, 255, 0.58);
        border: 1px solid var(--line);
        font-size: 13px;
        line-height: 1.6;
      }

      @media (max-width: 900px) {
        .page {
          padding: 20px 0;
        }

        .shell {
          grid-template-columns: 1fr;
        }

        .hero {
          min-height: 420px;
          padding: 30px;
        }
      }

      @media (max-width: 620px) {
        .page {
          width: min(100% - 20px, 1120px);
        }

        .toolbar,
        .url-card {
          grid-template-columns: 1fr;
        }

        .toolbar {
          align-items: flex-start;
          flex-direction: column;
        }

        .actions {
          width: 100%;
          display: grid;
          grid-template-columns: 1fr 1fr;
        }

        button,
        .button {
          text-align: center;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="shell" aria-label="仙路湾官网访问检测">
        <div class="hero">
          <div class="brand">
            <p class="eyebrow">Xianluwan Official</p>
            <h1>仙路湾<br />官网</h1>
            <p class="subtitle">
              正在为你检测当前浏览器到官网线路的连通性，优先选择最快可访问入口。
            </p>
          </div>

          <div class="hero-footer">
            <div class="current" aria-live="polite">
              <span id="globalDot" class="dot"></span>
              <span id="globalStatus">准备检测线路...</span>
            </div>
            <button id="jumpBest" type="button" disabled>跳转最佳入口</button>
          </div>
        </div>

        <div class="panel">
          <div class="toolbar">
            <div>
              <h2>访问入口</h2>
              <p id="summary">检测会在页面打开后自动开始。</p>
            </div>
            <label class="switch">
              <span>自动跳转</span>
              <input id="autoJump" type="checkbox" checked />
            </label>
          </div>

          <div id="urlList" class="list"></div>

          <div class="notice">
            将三个目标地址填入脚本顶部的 <strong>SITE_URLS</strong>。也可以用地址栏参数临时覆盖：
            <strong>?u1=https://a.com&u2=https://b.com&u3=https://c.com</strong>。
          </div>
        </div>
      </section>
    </main>

    <script>
      const SITE_URLS = [
        { name: "入口一", url: "https://yiyi.xlw.app" },
        { name: "入口二", url: "https://mm.xlw.app" },
        { name: "入口三", url: "https://https://js.xlw.app" },
      ];

      const TIMEOUT_MS = 4500;
      const AUTO_JUMP_DELAY_MS = 1200;

      const params = new URLSearchParams(window.location.search);
      const targets = SITE_URLS.map((item, index) => {
        const override = params.get(`u${index + 1}`);
        return {
          name: item.name,
          url: normalizeUrl(override || item.url),
        };
      });

      const urlList = document.querySelector("#urlList");
      const summary = document.querySelector("#summary");
      const globalDot = document.querySelector("#globalDot");
      const globalStatus = document.querySelector("#globalStatus");
      const jumpBest = document.querySelector("#jumpBest");
      const autoJump = document.querySelector("#autoJump");

      let bestTarget = null;
      let didAutoJump = false;

      init();

      function init() {
        renderTargets();
        jumpBest.addEventListener("click", () => {
          if (bestTarget) window.location.href = bestTarget.url;
        });
        runChecks();
      }

      function renderTargets() {
        urlList.innerHTML = targets
          .map(
            (target, index) => `
              <article class="url-card" id="target-${index}" data-state="checking">
                <div>
                  <div class="url-name">
                    <span class="status-dot"></span>
                    <span>${escapeHtml(target.name)}</span>
                  </div>
                  <div class="url-link">${escapeHtml(target.url)}</div>
                  <div class="url-meta">
                    <span class="pill" id="status-${index}">检测中</span>
                    <span class="pill latency" id="latency-${index}">等待响应</span>
                  </div>
                </div>
                <div class="actions">
                  <a class="button" href="${escapeAttr(target.url)}">打开</a>
                  <button class="secondary" type="button" data-recheck="${index}">重测</button>
                </div>
              </article>
            `,
          )
          .join("");

        urlList.querySelectorAll("[data-recheck]").forEach((button) => {
          button.addEventListener("click", () => {
            checkOne(Number(button.dataset.recheck), true);
          });
        });
      }

      async function runChecks() {
        updateGlobal("checking", "正在检测 3 条线路...");
        const results = await Promise.all(targets.map((_, index) => checkOne(index)));
        chooseBest(results);
      }

      async function checkOne(index, single = false) {
        const target = targets[index];
        const card = document.querySelector(`#target-${index}`);
        const status = document.querySelector(`#status-${index}`);
        const latency = document.querySelector(`#latency-${index}`);

        card.classList.remove("best");
        card.dataset.state = "checking";
        status.textContent = "检测中";
        latency.textContent = "等待响应";
        if (single) updateGlobal("checking", `正在重测 ${target.name}...`);

        const startedAt = performance.now();
        const result = await probeUrl(target.url);
        const elapsed = Math.round(performance.now() - startedAt);

        result.index = index;
        result.name = target.name;
        result.url = target.url;
        result.elapsed = elapsed;

        card.dataset.state = result.ok ? "ok" : "bad";
        status.textContent = result.ok ? "可访问" : "不可访问";
        latency.textContent = result.ok ? `${elapsed} ms` : result.reason;

        if (single) {
          const allCards = [...document.querySelectorAll(".url-card")];
          const currentResults = allCards.map((item, cardIndex) => ({
            index: cardIndex,
            name: targets[cardIndex].name,
            url: targets[cardIndex].url,
            ok: item.dataset.state === "ok",
            elapsed: Number(document.querySelector(`#latency-${cardIndex}`).textContent.replace(" ms", "")) || Infinity,
          }));
          chooseBest(currentResults, false);
        }

        return result;
      }

      async function probeUrl(url) {
        const controller = new AbortController();
        const timer = window.setTimeout(() => controller.abort(), TIMEOUT_MS);

        try {
          await fetch(url, {
            mode: "no-cors",
            cache: "no-store",
            signal: controller.signal,
          });
          return { ok: true, reason: "连接成功" };
        } catch (error) {
          return {
            ok: false,
            reason: error.name === "AbortError" ? "超时" : "失败",
          };
        } finally {
          window.clearTimeout(timer);
        }
      }

      function chooseBest(results, allowAutoJump = true) {
        const available = results
          .filter((item) => item.ok)
          .sort((a, b) => a.elapsed - b.elapsed);

        document.querySelectorAll(".url-card").forEach((card) => {
          card.classList.remove("best");
        });

        if (!available.length) {
          bestTarget = null;
          jumpBest.disabled = true;
          summary.textContent = "暂时没有检测到可访问入口，可以手动打开或稍后重测。";
          updateGlobal("bad", "未检测到可访问线路");
          return;
        }

        bestTarget = available[0];
        document.querySelector(`#target-${bestTarget.index}`).classList.add("best");
        jumpBest.disabled = false;
        summary.textContent = `最佳入口：${bestTarget.name}，响应约 ${bestTarget.elapsed} ms。`;
        updateGlobal("ok", `已找到可访问线路：${bestTarget.name}`);

        if (allowAutoJump && autoJump.checked && !didAutoJump) {
          didAutoJump = true;
          jumpBest.textContent = `${AUTO_JUMP_DELAY_MS / 1000} 秒后自动跳转`;
          window.setTimeout(() => {
            if (autoJump.checked && bestTarget) {
              window.location.href = bestTarget.url;
            } else {
              jumpBest.textContent = "跳转最佳入口";
            }
          }, AUTO_JUMP_DELAY_MS);
        }
      }

      function updateGlobal(state, text) {
        globalDot.className = `dot ${state === "ok" ? "ok" : state === "bad" ? "bad" : ""}`;
        globalStatus.textContent = text;
      }

      function normalizeUrl(value) {
        const trimmed = String(value || "").trim();
        if (!trimmed) return "";
        if (/^https?:\/\//i.test(trimmed)) return trimmed;
        return `https://${trimmed}`;
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function escapeAttr(value) {
        return escapeHtml(value).replaceAll("`", "&#096;");
      }
    </script>
  </body>
</html>
